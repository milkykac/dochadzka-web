<!DOCTYPE html>
<html lang="sk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Prihlásenie – Dochádzkový systém</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-light: #f4f7fe;
      --white: #ffffff;
      --success-green: #10b981; /* To pekné zelené tlačidlo */
      --text-muted: #888;
    }

    body {
      font-family: 'Poppins', sans-serif;
      background-color: var(--bg-light);
      margin: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
    }

    /* Karta prihlásenia vycentrovaná na stred */
    .login-card {
      background: var(--white);
      width: 100%;
      max-width: 400px;
      border-radius: 16px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.05);
      padding: 40px;
      animation: fadeIn 0.5s ease-in-out;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .card-header {
      margin-bottom: 30px;
      text-align: center;
    }

    .card-header h2 {
      margin: 0;
      font-size: 24px;
      color: #111827;
      font-weight: 600;
    }

    .card-header p {
      color: var(--text-muted);
      font-size: 14px;
      margin-top: 5px;
    }

    .input-group {
      margin-bottom: 20px;
      position: relative;
    }

    label {
      display: block;
      font-size: 13px;
      color: #374151;
      margin-bottom: 8px;
      font-weight: 500;
    }

    input {
      width: 100%;
      padding: 12px 15px;
      border: 1px solid #e5e7eb;
      border-radius: 10px;
      font-family: 'Poppins', sans-serif;
      font-size: 14px;
      outline: none;
      box-sizing: border-box;
      transition: all 0.2s;
      background-color: #f9fafb;
    }

    input:focus {
      border-color: var(--success-green);
      background-color: #fff;
      box-shadow: 0 0 0 3px rgba(16, 185, 129, 0.1);
    }

    /* Zelené tlačidlo podľa vášho výberu */
    .btn-login {
      width: 100%;
      background: var(--success-green);
      color: white;
      border: none;
      padding: 12px;
      border-radius: 10px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: 0.2s;
      margin-top: 10px;
    }

    .btn-login:hover {
      background: #059669;
      transform: translateY(-1px);
    }

    .eye-toggle {
      position: absolute;
      right: 15px;
      top: 38px;
      cursor: pointer;
      color: #9ca3af;
    }

    .error-msg {
      background: #fef2f2;
      color: #dc2626;
      padding: 10px;
      border-radius: 8px;
      margin-top: 20px;
      font-size: 13px;
      display: none;
      text-align: center;
      border: 1px solid #fee2e2;
    }

    .footer-text {
      text-align: center;
      margin-top: 25px;
      font-size: 12px;
      color: var(--text-muted);
      letter-spacing: 0.5px;
    }
  </style>
</head>
<body>

  <div class="login-card">
    <div class="card-header">
      <h2>Prihlásenie</h2>
      <p>Zadajte svoje údaje pre prístup</p>
    </div>
    
    <div class="input-group">
      <label>Meno</label>
      <input type="text" id="username" placeholder="Vaše meno">
    </div>
    
    <div class="input-group">
      <label>Heslo</label>
      <input type="password" id="password" placeholder="••••••••">
      <span class="eye-toggle" id="togglePassword">👁️‍🗨️</span>
    </div>
    
    <button id="loginBtn" class="btn-login">Prihlásiť sa</button>
    
    <div id="errorMsg" class="error-msg"></div>
    
    <div class="footer-text">
      © 2025 DOCHÁDZKOVÝ SYSTÉM
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-app.js";
    import { getDatabase, ref, get } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-database.js";

    const firebaseConfig = {
      apiKey: "AIzaSyBsYrbYtP4E5blWbKlrJ6iI9v6YPAYp0g",
      authDomain: "maturita-395fd.firebaseapp.com",
      databaseURL: "https://maturita-395fd-default-rtdb.firebaseio.com",
      projectId: "maturita-395fd",
      storageBucket: "maturita-395fd.firebasestorage.app",
      messagingSenderId: "754745500563",
      appId: "1:754745500563:web:74fd4d6ab5765ee788be66",
      measurementId: "G-F6KQQS48GD"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    const loginBtn = document.getElementById("loginBtn");
    const errorMsg = document.getElementById("errorMsg");
    const togglePassword = document.getElementById("togglePassword");
    const passwordInput = document.getElementById("password");

    togglePassword.addEventListener("click", () => {
      const type = passwordInput.getAttribute("type") === "password" ? "text" : "password";
      passwordInput.setAttribute("type", type);
    });

    function showError(message) {
      errorMsg.textContent = message;
      errorMsg.style.display = "block";
      setTimeout(() => errorMsg.style.display = "none", 4000);
    }

    loginBtn.addEventListener("click", async () => {
      const name = document.getElementById("username").value.trim();
      const password = passwordInput.value.trim();

      if (!name || !password) {
        showError("Zadajte prihlasovacie údaje!");
        return;
      }

      if (name === "admin" && password === "1234") {
        localStorage.setItem("uid", "admin");
        window.location.href = "admin.html";
        return;
      }

      try {
        const snapshot = await get(ref(db, "users/"));
        let found = false;
        if (snapshot.exists()) {
          snapshot.forEach(child => {
            const user = child.val();
            if (user.name === name && user.password === password) {
              localStorage.setItem("uid", child.key);
              found = true;
              window.location.href = "employee.html";
            }
          });
        }
        if (!found) showError("Nesprávne meno alebo heslo!");
      } catch (err) {
        showError("Chyba pripojenia!");
      }
    });
  </script>
</body>
</html>
