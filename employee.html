<!DOCTYPE html>
<html lang="sk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dochádzka – Zamestnanec</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
  :root {
    --bg: #F0F2F5;
    --surface: #FFFFFF;
    --surface-2: #F7F8FA;
    --border: #E2E5EA;
    --text-primary: #111827;
    --text-secondary: #6B7280;
    --text-muted: #9CA3AF;
    --accent: #1D4ED8;
    --accent-hover: #1E40AF;
    --accent-light: #EFF6FF;
    --success: #059669;
    --success-light: #ECFDF5;
    --danger: #DC2626;
    --danger-light: #FEF2F2;
    --warning: #D97706;
    --warning-light: #FFFBEB;
    --purple: #7C3AED;
    --purple-light: #F5F3FF;
    --shadow-sm: 0 1px 3px rgba(0,0,0,0.06), 0 1px 2px rgba(0,0,0,0.04);
    --shadow-md: 0 4px 12px rgba(0,0,0,0.08), 0 2px 4px rgba(0,0,0,0.04);
    --shadow-lg: 0 10px 30px rgba(0,0,0,0.10), 0 4px 8px rgba(0,0,0,0.05);
    --radius: 10px;
    --radius-sm: 6px;
    --radius-lg: 14px;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    min-height: 100vh;
    color: var(--text-primary);
    font-size: 14px;
    line-height: 1.5;
  }

  /* ── SIDEBAR LAYOUT ── */
  .layout { display: flex; min-height: 100vh; }

  .sidebar {
    width: 240px;
    background: var(--surface);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    position: fixed;
    top: 0; left: 0; bottom: 0;
    z-index: 50;
    box-shadow: var(--shadow-sm);
  }

  .sidebar-logo {
    padding: 24px 20px 20px;
    border-bottom: 1px solid var(--border);
  }

  .sidebar-logo .logo-mark {
    width: 36px; height: 36px;
    background: var(--accent);
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    margin-bottom: 12px;
  }

  .sidebar-logo .logo-mark svg { width: 18px; height: 18px; fill: white; }

  .sidebar-logo h1 {
    font-size: 15px;
    font-weight: 700;
    color: var(--text-primary);
    letter-spacing: -0.3px;
  }

  .sidebar-logo p {
    font-size: 11px;
    color: var(--text-muted);
    margin-top: 2px;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  .sidebar-nav {
    flex: 1;
    padding: 16px 12px;
    display: flex;
    flex-direction: column;
    gap: 2px;
  }

  .nav-label {
    font-size: 10px;
    font-weight: 600;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.8px;
    padding: 12px 8px 6px;
  }

  .nav-btn {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 9px 12px;
    border-radius: var(--radius-sm);
    border: none;
    background: transparent;
    color: var(--text-secondary);
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.15s ease;
    width: 100%;
    text-align: left;
  }

  .nav-btn:hover { background: var(--surface-2); color: var(--text-primary); }

  .nav-btn.active {
    background: var(--accent-light);
    color: var(--accent);
    font-weight: 600;
  }

  .nav-btn .nav-icon {
    width: 18px; height: 18px;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    opacity: 0.7;
  }
  .nav-btn.active .nav-icon { opacity: 1; }

  .sidebar-footer {
    padding: 16px 12px;
    border-top: 1px solid var(--border);
  }

  .logout-btn {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 9px 12px;
    border-radius: var(--radius-sm);
    border: none;
    background: transparent;
    color: var(--danger);
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.15s ease;
    width: 100%;
    text-align: left;
  }

  .logout-btn:hover { background: var(--danger-light); }

  /* ── MAIN CONTENT ── */
  .main {
    margin-left: 240px;
    flex: 1;
    display: flex;
    flex-direction: column;
    min-height: 100vh;
  }

  .topbar {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 16px 32px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 40;
    box-shadow: var(--shadow-sm);
  }

  .topbar-left h2 {
    font-size: 18px;
    font-weight: 700;
    color: var(--text-primary);
    letter-spacing: -0.4px;
  }

  .topbar-left p {
    font-size: 12px;
    color: var(--text-muted);
    margin-top: 1px;
  }

  .topbar-badge {
    background: var(--success-light);
    color: var(--success);
    font-size: 11px;
    font-weight: 600;
    padding: 3px 9px;
    border-radius: 20px;
    border: 1px solid #A7F3D0;
  }

  .content { padding: 28px 32px; }

  /* ── SECTIONS ── */
  section { display: none; animation: fadeIn 0.2s ease; }
  section.active { display: block; }

  @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }

  /* ── CARDS ── */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    box-shadow: var(--shadow-sm);
    overflow: hidden;
    margin-bottom: 24px;
  }

  .card-header {
    padding: 20px 24px 16px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
    flex-wrap: wrap;
  }

  .card-title {
    font-size: 15px;
    font-weight: 700;
    color: var(--text-primary);
    letter-spacing: -0.3px;
  }

  /* ── TOOLBAR & BUTTONS ── */
  .toolbar {
    display: flex;
    gap: 10px;
    align-items: center;
    flex-wrap: wrap;
  }

  .btn {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 8px 14px;
    border-radius: var(--radius-sm);
    border: none;
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.15s ease;
    white-space: nowrap;
    letter-spacing: -0.1px;
  }

  .btn-ghost {
    background: var(--surface-2);
    color: var(--text-secondary);
    border: 1px solid var(--border);
  }
  .btn-ghost:hover { background: var(--border); color: var(--text-primary); }
  .btn-sm { padding: 5px 10px; font-size: 12px; }

  /* ── FILTERS ── */
  .filters {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    padding: 16px 24px;
    background: var(--surface-2);
    border-bottom: 1px solid var(--border);
  }

  .filter-input {
    padding: 8px 12px;
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    color: var(--text-primary);
    background: var(--surface);
    transition: border-color 0.15s;
    outline: none;
  }

  .filter-input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(29,78,216,0.08); }
  .filter-input[type="date"] { flex: 0 0 160px; }

  /* ── TABLE ── */
  .table-wrap { overflow-x: auto; }

  table {
    width: 100%;
    border-collapse: collapse;
    font-size: 13.5px;
  }

  thead tr { background: var(--surface-2); border-bottom: 2px solid var(--border); }

  th {
    padding: 11px 16px;
    text-align: left;
    font-size: 11px;
    font-weight: 700;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.6px;
    white-space: nowrap;
  }

  td {
    padding: 13px 16px;
    border-bottom: 1px solid var(--border);
    color: var(--text-primary);
    vertical-align: middle;
  }

  tbody tr:last-child td { border-bottom: none; }
  tbody tr:hover { background: var(--surface-2); }

  .empty-row td {
    text-align: center;
    color: var(--text-muted);
    padding: 40px;
    font-size: 14px;
  }

  .loader-row td {
    text-align: center;
    color: var(--accent);
    padding: 32px;
    font-weight: 500;
  }

  /* ── STATUS BADGES ── */
  .badge {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    padding: 4px 10px;
    border-radius: 20px;
    font-size: 12px;
    font-weight: 600;
    letter-spacing: -0.1px;
    white-space: nowrap;
  }

  .badge::before {
    content: '';
    width: 6px; height: 6px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  .badge-success { background: var(--success-light); color: var(--success); border: 1px solid #A7F3D0; }
  .badge-success::before { background: var(--success); }

  .badge-danger { background: var(--danger-light); color: var(--danger); border: 1px solid #FECACA; }
  .badge-danger::before { background: var(--danger); }

  .badge-warning { background: var(--warning-light); color: var(--warning); border: 1px solid #FDE68A; }
  .badge-warning::before { background: var(--warning); }

  .badge-purple { background: var(--purple-light); color: var(--purple); border: 1px solid #DDD6FE; }
  .badge-purple::before { background: var(--purple); }

  .badge-neutral { background: var(--surface-2); color: var(--text-secondary); border: 1px solid var(--border); }
  .badge-neutral::before { background: var(--text-muted); }

  .time-cell {
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    color: var(--text-secondary);
  }

  /* ── STATUS BANNER ── */
  .status-banner {
    background: var(--accent-light);
    border: 1px solid #BFDBFE;
    color: var(--accent);
    padding: 16px 24px;
    border-radius: var(--radius-lg);
    margin-bottom: 24px;
    font-weight: 600;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .status-banner svg { width: 20px; height: 20px; }

  /* ── RESPONSIVE ── */
  @media (max-width: 768px) {
    .sidebar { display: none; }
    .main { margin-left: 0; }
    .content { padding: 16px; }
    .topbar { padding: 14px 16px; }
  }
</style>
</head>
<body>

<div class="layout">

  <aside class="sidebar">
    <div class="sidebar-logo">
      <div class="logo-mark">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 14H9V8h2v8zm4 0h-2V8h2v8z"/>
        </svg>

      <p>Zamestnanec</p>

    <nav class="sidebar-nav">
      <div class="nav-label">Moje záznamy</div>

      <button class="nav-btn active" data-target="dochadzka">

          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">

      </button>
    </div>

  <div class="main">

    <header class="topbar">
      <div class="topbar-left">
        <h2 id="topbarTitle">Vitaj, <span id="userName">Načítavam...</span></h2>
        <p id="topbarSub">Tvoj osobný prehľad dochádzky</p>

      <span class="topbar-badge">Zamestnanec</span>
    </header>

    <div class="content">

      <div id="statusBox" class="status-banner">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>

      <section id="dochadzka" class="active">

          <div class="card-header">

              <button class="btn btn-ghost btn-sm" onclick="exportTable('dochadzka')" data-export-table="dochadzka">
                <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>

              </button>

          <div class="table-wrap">
            <table>
              <thead><tr><th>Čas</th><th>Typ</th></tr></thead>
              <tbody id="dochadzkaTable"><tr class="loader-row"><td colspan="2">Načítavam dáta…</td></tr></tbody>

              <button class="btn btn-ghost btn-sm" onclick="exportTable('prestavky')" data-export-table="prestavky">
                <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>

              </button>

              <thead><tr><th>Čas</th><th>Typ</th></tr></thead>

      <section id="pn">

          <div class="card-header">
            <span class="card-title">PN — Pracovná neschopnosť</span>
            <div class="toolbar">
              <button class="btn btn-ghost btn-sm" onclick="exportTable('pn')" data-export-table="pn">
                <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
                Export XLSX
              </button>

          </div>
          <div class="filters">
            <input type="date" id="datePN" class="filter-input">
          </div>

            <table>
              <thead><tr><th>Čas</th><th>Typ</th></tr></thead>

            </table>
          </div>
        </div>
      </section>

    </div></div></div><script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.2/firebase-app.js";
import { getDatabase, ref, get } from "https://www.gstatic.com/firebasejs/9.22.2/firebase-database.js";

const firebaseConfig = {
    apiKey: "AIzaSyBsYrbYtP4E5blWbKlrJ6iI9v6YPAYYp0g",
    authDomain: "maturita-395fd.firebaseapp.com",
    databaseURL: "https://maturita-395fd-default-rtdb.firebaseio.com",
    projectId: "maturita-395fd",
    storageBucket: "maturita-395fd.firebasestorage.app",
    messagingSenderId: "754745500563",
    appId: "1:754745500563:web:74fd4d6ab5765ee788be66",
    measurementId: "G-F6KQQS48GD"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

const userId = localStorage.getItem("uid");
const userNameEl = document.getElementById("userName");
const statusBox = document.querySelector("#statusBox span");
let allRecordsCache = []; 

if (!userId) {
    alert("Nie si prihlásený!");
    window.location.href = "index.html";
} else if (userId === "admin") {
    window.location.href = "admin.html";
}

// Helper: badge HTML
function badgeFor(stav, rawType) {
  const map = {
    prichod:  'badge-success',
    odchod:   'badge-danger',
    prestavka:'badge-warning',
    pn:       'badge-purple',
  };
  return `<span class="badge ${map[stav] || 'badge-neutral'}">${rawType}</span>`;
}

async function loadUserData() {
    try {
        const userSnap = await get(ref(db, `users/${userId}`));
        
        if (!userSnap.exists()) {
            userNameEl.textContent = "(Neznámy)";
            statusBox.textContent = "Chyba: Dáta neexistujú!";
            renderTables([]);
            return;
        }

        const userData = userSnap.val();
        userNameEl.textContent = userData.name || "(bez mena)";

        const records = [];
        const allPossibleLogs = [];
        
        ["dochadzka", "prestavky", "pn"].forEach(type => {
            const logsObj = userData[type] || {};
            Object.values(logsObj).forEach(log => allPossibleLogs.push(log));
        });
        Object.values(userData).forEach(prop => {
            if (prop && prop.cas && prop.typ) {
                allPossibleLogs.push(prop); 
            }
        });
        
        allPossibleLogs.forEach(log => {
            if (!log || !log.cas || !log.typ) return;

            let cleanTime = String(log.cas);
            let validIsoTime = cleanTime;
            let displayTime = cleanTime; 

            const dateRegex = /(\d{1,2})\.(\d{1,2})\.(\d{4}) (\d{1,2}:\d{1,2})/;
            const match = cleanTime.match(dateRegex);

            if (match) {
                const [, day, month, year, time] = match;
                validIsoTime = `${year}-${month.padStart(2, '0')}-${day.padStart(2, '0')} ${time}`;
                displayTime = `${day.padStart(2, '0')}.${month.padStart(2, '0')}.${year} ${time}`;
            } else if (cleanTime.includes('T') && cleanTime.includes('-')) {
                validIsoTime = cleanTime.replace('T', ' '); 
                const [date, time] = validIsoTime.split(' ');
                const [y, m, d] = date.split('-');
                displayTime = `${d.padStart(2, '0')}.${m.padStart(2, '0')}.${y} ${time.substring(0, 5)}`;
            } else if (cleanTime.includes('-') && cleanTime.length >= 16) {
                validIsoTime = cleanTime; 
                const [date, time] = validIsoTime.split(' ');
                const [y, m, d] = date.split('-');
                displayTime = `${d.padStart(2, '0')}.${m.padStart(2, '0')}.${y} ${time.substring(0, 5)}`;
            } else { return; }
            
            const cleanType = String(log.typ).normalize("NFD").replace(/[\u0300-\u036f]/g, "").toLowerCase();

            let recordType = null;
            if (cleanType.includes('prichod')) recordType = 'prichod';
            else if (cleanType.includes('odchod')) recordType = 'odchod';
            else if (cleanType.includes('prestavka')) recordType = 'prestavka';
            else if (cleanType.includes('pn')) recordType = 'pn';
            
            if (recordType) {
                 const isDuplicate = records.some(r => r.cas === validIsoTime && r.stav === recordType);
                 if (!isDuplicate) {
                     records.push({
                         cas: validIsoTime,
                         casDisplay: displayTime, 
                         stav: recordType,
                         date: displayTime.substring(0, 10),
                         time: displayTime.substring(11, 16),
                         rawType: log.typ.toUpperCase()
                     });
                 }
            }
        });

        records.sort((a, b) => new Date(b.cas) - new Date(a.cas));
        allRecordsCache = records;
        
        const mainStatusRecord = records.find(r => r.stav !== 'prestavka'); 
        const lastStatus = mainStatusRecord ? mainStatusRecord.rawType : "Žiadny stav nezaznamenaný";
        
        statusBox.innerHTML = `Posledný zaznamenaný stav: <strong>${lastStatus}</strong>`;

        renderTables(allRecordsCache);

    } catch (e) {
        console.error(e);
        statusBox.textContent = "Kritická chyba pri načítaní dát!";
        renderTables([]);
    }
}

function renderTables(records) {
    const dochadzkaTable = document.getElementById("dochadzkaTable");
    const prestavkyTable = document.getElementById("prestavkyTable");
    const pnTable = document.getElementById("pnTable");

    const filterDochadzka = document.getElementById("dateDochadzka").value;
    const filterPrestavky = document.getElementById("datePrestavky").value;
    const filterPN = document.getElementById("datePN").value;

    const renderSection = (bodyEl, expectedStav, filterDate) => {
        let filtered = records;
        if(filterDate) filtered = filtered.filter(r => r.cas.substring(0, 10) === filterDate);
        const sectionRecords = filtered.filter(r => expectedStav.includes(r.stav));
        
        if (!sectionRecords.length) {
            bodyEl.innerHTML = `<tr class="empty-row"><td colspan="2">Žiadne záznamy</td></tr>`;
        } else {
            bodyEl.innerHTML = sectionRecords.map(z => `
                <tr>
                    <td><span class="time-cell">${z.casDisplay}</span></td>
                    <td>${badgeFor(z.stav, z.rawType)}</td>
                </tr>
            `).join("");
        }
    };

    renderSection(dochadzkaTable, ["prichod", "odchod"], filterDochadzka);
    renderSection(prestavkyTable, ["prestavka"], filterPrestavky);
    renderSection(pnTable, ["pn"], filterPN);
}

function msToHhMm(ms) {
    const totalMinutes = Math.floor(ms / (1000 * 60));
    const hours = Math.floor(totalMinutes / 60);
    const minutes = totalMinutes % 60;
    return `${String(hours).padStart(2, '0')}:${String(minutes).padStart(2, '0')}`;
}

window.exportTable = function(sectionType) {
    const userName = userNameEl.textContent;
    let filterDate, expectedStav, sectionTitle, header, fileNameBase;

    if (sectionType === 'dochadzka') {
        filterDate = document.getElementById("dateDochadzka").value;
        expectedStav = ["prichod", "odchod"];
        sectionTitle = "Dochádzka (Príchod/Odchod) a Sumarizácia";
        header = ["Dátum", "Čas", "Typ", "Odpracovaný čas/Status"]; 
        fileNameBase = "dochadzka_sumar";
    } else if (sectionType === 'prestavky') {
        filterDate = document.getElementById("datePrestavky").value;
        expectedStav = ["prestavka"];
        sectionTitle = "Prestávky";
        header = ["Dátum a Čas", "Typ"];
        fileNameBase = "prestavky";
    } else if (sectionType === 'pn') {
        filterDate = document.getElementById("datePN").value;
        expectedStav = ["pn"];
        sectionTitle = "PN";
        header = ["Dátum a Čas", "Typ"];
        fileNameBase = "pn";
    } else return;
    
    let filteredRecords = allRecordsCache;
    if(filterDate) filteredRecords = filteredRecords.filter(r => r.cas.substring(0, 10) === filterDate);
    
    const sortedRecords = filteredRecords
        .filter(r => expectedStav.includes(r.stav))
        .sort((a, b) => new Date(a.cas) - new Date(b.cas));

    const exportData = [
        ["Typ záznamu:", sectionTitle],
        ["Používateľ:", userName],
        [], 
        header 
    ];
    
    let totalWorkMs = 0; let lastPrichod = null; let lastDate = null; let dailyWorkMs = 0;

    if (sectionType === 'dochadzka') {
        sortedRecords.forEach((record) => {
            const currentDateTime = new Date(record.cas);
            const currentDateStr = record.date;
            const currentTimeStr = record.time;

            if (lastDate && lastDate !== currentDateStr) {
                if (dailyWorkMs > 0) exportData.push(["", "Sumarizácia dňa:", lastDate, msToHhMm(dailyWorkMs)]);
                dailyWorkMs = 0;
            }

            if (record.stav === 'prichod') {
                lastPrichod = currentDateTime;
                exportData.push([currentDateStr, currentTimeStr, record.rawType, ""]);
            } else if (record.stav === 'odchod' && lastPrichod) {
                const durationMs = currentDateTime - lastPrichod;
                totalWorkMs += durationMs; dailyWorkMs += durationMs;
                exportData.push([currentDateStr, currentTimeStr, record.rawType, msToHhMm(durationMs)]);
                lastPrichod = null; 
            } else {
                exportData.push([currentDateStr, currentTimeStr, record.rawType, "Chyba PRICHOD"]);
            }
            lastDate = currentDateStr;
        });

        if (lastDate && dailyWorkMs > 0) exportData.push(["", "Sumarizácia dňa:", lastDate, msToHhMm(dailyWorkMs)]);
        exportData.push([]); 
        exportData.push(["Celková odpracovaná doba:", "", "", msToHhMm(totalWorkMs)]);

    } else { 
        if (sortedRecords.length === 0) exportData.push(["Žiadne záznamy", ""]);
        else sortedRecords.forEach(z => exportData.push([z.casDisplay, z.rawType]));
    }

    const wb = XLSX.utils.book_new();
    const ws = XLSX.utils.aoa_to_sheet(exportData);
    
    if (sectionType === 'dochadzka') {
        ws['!cols'] = [{ wpx: 100 }, { wpx: 150 }, { wpx: 100 }, { wpx: 150 }];
        const finalRowIndex = exportData.length - 1;
        for (let i = 4; i < exportData.length; i++) {
            const row = exportData[i];
            if (row[1] === "Sumarizácia dňa:") {
                if (ws[XLSX.utils.encode_cell({ r: i, c: 1 })]) ws[XLSX.utils.encode_cell({ r: i, c: 1 })].s = { font: { bold: true } };
                if (ws[XLSX.utils.encode_cell({ r: i, c: 3 })]) ws[XLSX.utils.encode_cell({ r: i, c: 3 })].s = { font: { bold: true }, fill: { fgColor: { rgb: "FFFFCC00" } } }; 
            }
            if (row[3] === "Chyba PRICHOD") { 
                if (ws[XLSX.utils.encode_cell({ r: i, c: 3 })]) ws[XLSX.utils.encode_cell({ r: i, c: 3 })].s = { font: { bold: true, color: { rgb: "FFFFFFFF" } }, fill: { fgColor: { rgb: "FFCC0000" } } }; 
            }
            if (i === finalRowIndex && row[0] === "Celková odpracovaná doba:") {
                if (ws[XLSX.utils.encode_cell({ r: i, c: 0 })]) ws[XLSX.utils.encode_cell({ r: i, c: 0 })].s = { font: { bold: true } };
                if (ws[XLSX.utils.encode_cell({ r: i, c: 3 })]) ws[XLSX.utils.encode_cell({ r: i, c: 3 })].s = { font: { bold: true }, fill: { fgColor: { rgb: "FF00B050" } } }; 
            }
        }
    } else {
          ws['!cols'] = [{ wpx: 150 }, { wpx: 100 }];
    }
    
    XLSX.utils.book_append_sheet(wb, ws, "Dochádzka");

    const safeUserName = userName.replace(/[^a-zA-Z0-9]/g, '_').toLowerCase();
    XLSX.writeFile(wb, `${fileNameBase}_${safeUserName}_export.xlsx`);
    
    const btn = document.querySelector(`[data-export-table="${sectionType}"]`);
    if(btn) {
        btn.textContent = "✓ Stiahnuté";
        setTimeout(() => btn.innerHTML = `<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg> Export XLSX`, 2000);
    }
};

// --- Listenery ---
document.getElementById("logoutBtn").addEventListener("click", () => {
    localStorage.removeItem("uid");
    window.location.href = "index.html";
});

document.querySelectorAll(".nav-btn").forEach(btn => {
    btn.addEventListener("click", () => {
        document.querySelectorAll(".nav-btn").forEach(b => b.classList.remove("active"));
        btn.classList.add("active");
        document.querySelectorAll("section").forEach(sec => sec.classList.remove("active"));
        document.getElementById(btn.dataset.target).classList.add("active");
        renderTables(allRecordsCache); 
    });
});

document.getElementById("dateDochadzka").addEventListener("change", () => renderTables(allRecordsCache));
document.getElementById("datePrestavky").addEventListener("change", () => renderTables(allRecordsCache));
document.getElementById("datePN").addEventListener("change", () => renderTables(allRecordsCache));

loadUserData();
</script>
